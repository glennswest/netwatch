[server]
listen = "0.0.0.0:80"
data_dir = "/data"

[discovery]
interval_secs = 900
snmp_community = "public"
snmp_timeout_ms = 2000
auto_add_services = true
scan_ports = [22, 23, 53, 80, 161, 443, 8080, 8291, 8728, 8729]

[monitoring]
default_interval_secs = 60
default_timeout_ms = 5000
concurrency = 20

[alerting]
cooldown_secs = 300
consecutive_failures = 3

[retention]
probe_days = 30
metric_days = 90
alert_days = 180

[[subnets]]
name = "g1"
cidr = "192.168.1.0/24"
snmp_community = "public"

[[subnets]]
name = "g8"
cidr = "192.168.8.0/24"
snmp_community = "public"

[[subnets]]
name = "g9"
cidr = "192.168.9.0/24"
snmp_community = "public"

[[subnets]]
name = "g10"
cidr = "192.168.10.0/24"
snmp_community = "public"

[[subnets]]
name = "g11"
cidr = "192.168.11.0/24"
snmp_community = "public"

[[subnets]]
name = "gt"
cidr = "192.168.200.0/24"
snmp_community = "public"
