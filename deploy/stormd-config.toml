[general]
name = "netwatch"
log_dir = "/var/stormd/logs"

[api]
bind = "0.0.0.0:9080"

[ssh]
enabled = true
bind = "0.0.0.0:22"
host_key = "/var/stormd/host_key"
password = "changeme"

[stormlog.terminal]
rows = 50
cols = 120
scrollback = 10000

[[process]]
name = "netwatch"
command = "/app/netwatch"
args = ["--config", "/etc/netwatch/netwatch.toml", "--data-dir", "/data"]
on_failure = "restart"
on_exit = "restart"
restart_delay_secs = 2
max_restarts = 0
