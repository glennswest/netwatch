{% extends "base.html" %}
{% block title %}Network Map — Netwatch{% endblock %}
{% block head %}
<style>
    .map-container {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        position: relative;
        width: 100%;
        height: calc(100vh - 140px);
    }
    .map-toolbar {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        display: flex;
        gap: 0.5rem;
        z-index: 10;
    }
    #network-map {
        width: 100%;
        height: 100%;
        cursor: grab;
    }
    #network-map:active { cursor: grabbing; }
</style>
{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Network Map</h1>
    <div style="display:flex;gap:0.5rem;">
        <button class="btn btn-primary btn-sm" onclick="autoLayout()">Auto Layout</button>
        <button class="btn btn-sm" onclick="zoomIn()">+</button>
        <button class="btn btn-sm" onclick="zoomOut()">-</button>
        <button class="btn btn-sm" onclick="resetView()">Reset</button>
    </div>
</div>
<div class="map-container">
    <svg id="network-map" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
{% endblock %}
{% block scripts %}
<script>
    const MAP_DEVICES = {{ devices_json|safe }};
    const MAP_LINKS = {{ links_json|safe }};
</script>
<script src="/ui/static/map.js"></script>
{% endblock %}
