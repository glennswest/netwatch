{% extends "base.html" %}
{% block title %}Alerts — Netwatch{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Alerts</h1>
    <div style="display:flex;gap:0.5rem;align-items:center;">
        <button class="btn btn-danger btn-sm"
                hx-delete="/api/alerts/clear"
                hx-target="#alerts-table-body"
                hx-swap="innerHTML"
                hx-confirm="Clear all alerts?">Clear All</button>
        <span class="htmx-indicator" id="alerts-loading">refreshing...</span>
    </div>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Severity</th>
                <th>Device</th>
                <th>Message</th>
                <th>Time</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="alerts-table-body" hx-get="/ui/partials/alerts-table" hx-trigger="every 10s" hx-indicator="#alerts-loading">
            {% include "alerts_table.html" %}
        </tbody>
    </table>
</div>
{% endblock %}
