{% extends "base.html" %}
{% block title %}Devices — Netwatch{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Devices</h1>
    <span class="htmx-indicator" id="devices-loading">refreshing...</span>
</div>

<div class="form-section">
    <h3>Add Device</h3>
    <form hx-post="/api/devices" hx-target="#devices-table-body" hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful) this.reset()">
        <div class="form-row">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="router-01" required>
            </div>
            <div class="form-group">
                <label>IP Address</label>
                <input type="text" name="ip" placeholder="192.168.1.1" required>
            </div>
            <div class="form-group">
                <label>Type</label>
                <select name="device_type">
                    <option value="router">Router</option>
                    <option value="switch">Switch</option>
                    <option value="server">Server</option>
                    <option value="firewall">Firewall</option>
                    <option value="ap">Access Point</option>
                    <option value="printer">Printer</option>
                    <option value="other" selected>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>SNMP Community</label>
                <input type="text" name="snmp_community" placeholder="public">
            </div>
            <div class="form-group" style="flex: 0;">
                <label>&nbsp;</label>
                <button type="submit" class="btn btn-primary">Add</button>
            </div>
        </div>
    </form>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Status</th>
                <th>Name</th>
                <th>IP</th>
                <th>Type</th>
                <th>Vendor</th>
                <th>Services</th>
                <th>Latency</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="devices-table-body" hx-get="/ui/partials/devices-table" hx-trigger="every 10s" hx-indicator="#devices-loading">
            {% include "devices_table.html" %}
        </tbody>
    </table>
</div>
{% endblock %}
